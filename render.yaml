databases:
  - name: learning-db
    databaseName: learning_db
    user: learning_user
    plan: free

services:
  - type: web
    name: learning-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: learning-db
          property: connectionString
      - key: DB_SSL
        value: "true"

  - type: web
    name: learning-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: learning-api
          property: host
